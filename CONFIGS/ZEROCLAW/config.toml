# Observability settings remain unchanged
[observability]
backend = "log"
runtime_trace_mode = "full"
runtime_trace_path = "state/runtime-trace.jsonl"
runtime_trace_max_entries = 1000

# Autonomy settings remain unchanged
[autonomy]
level = "supervised"
workspace_only = true
allowed_commands = [
    "git", "npm", "cargo", "ls", "cat", "grep", "find", "echo", "pwd", "wc", "head", "tail", "date",
]
forbidden_paths = [
    "/etc", "/root", "/home", "/usr", "/bin", "/sbin", "/lib", "/opt", "/boot", "/dev", "/proc", "/sys", "/var", "/tmp",
    "~/.ssh", "~/.gnupg", "~/.aws", "~/.config",
]
max_actions_per_hour = 20
max_cost_per_day_cents = 500
require_approval_for_medium_risk = true
block_high_risk_commands = true
shell_env_passthrough = []
auto_approve = ["file_read", "memory_recall"]
always_ask = []
allowed_roots = []
non_cli_excluded_tools = [
    "shell", "file_write", "file_edit", "git_operations", "browser", "browser_open", "http_request",
    "schedule", "cron_add", "cron_remove", "cron_update", "cron_run", "memory_store",
    "memory_forget", "proxy_config", "model_routing_config", "pushover", "composio",
    "delegate", "screenshot", "image_info",
]
non_cli_approval_approvers = []
non_cli_natural_language_approval_mode = "direct"

[autonomy.non_cli_natural_language_approval_mode_by_channel]

# Security settings remain unchanged
[security]
roles = []

[security.sandbox]
backend = "auto"
firejail_args = []

[security.resources]
max_memory_mb = 512
max_cpu_time_seconds = 60
max_subprocesses = 10
memory_monitoring = true

[security.audit]
enabled = true
log_path = "state/audit.log"
max_size_mb = 100
sign_events = false

[security.otp]
enabled = true
method = "totp"
token_ttl_secs = 30
cache_valid_secs = 300
gated_actions = ["shell", "file_write", "browser_open", "browser", "memory_forget"]
gated_domains = []
gated_domain_categories = []

[security.estop]
enabled = false
state_file = "~/.zeroclaw/estop-state.json"
require_otp_to_resume = true

[security.syscall_anomaly]
enabled = true
strict_mode = false
alert_on_unknown_syscall = true
max_denied_events_per_minute = 5
max_total_events_per_minute = 120
max_alerts_per_minute = 30
alert_cooldown_secs = 20
log_path = "syscall-anomalies.log"
baseline_syscalls = [
    "read", "write", "open", "openat", "close", "stat", "fstat", "newfstatat", "lseek", "mmap",
    "mprotect", "munmap", "brk", "rt_sigaction", "rt_sigprocmask", "ioctl", "fcntl", "access",
    "pipe2", "dup", "dup2", "dup3", "epoll_create1", "epoll_ctl", "epoll_wait", "poll", "ppoll",
    "select", "futex", "clock_gettime", "nanosleep", "getpid", "gettid", "set_tid_address",
    "set_robust_list", "clone", "clone3", "fork", "execve", "wait4", "exit", "exit_group", "socket",
    "connect", "accept", "accept4", "listen", "sendto", "recvfrom", "sendmsg", "recvmsg",
    "getsockname", "getpeername", "setsockopt", "getsockopt", "getrandom", "statx",
]

[security.perplexity_filter]
enable_perplexity_filter = false
perplexity_threshold = 18.0
suffix_window_chars = 64
min_prompt_chars = 32
symbol_ratio_threshold = 0.2

[security.url_access]
block_private_ip = true
allow_cidrs = []
allow_domains = []
allow_loopback = false

# Runtime settings remain unchanged
[runtime]
kind = "native"

[runtime.docker]
image = "alpine:3.20"
network = "none"
memory_limit_mb = 512
cpu_limit = 1.0
read_only_rootfs = true
mount_workspace = true
allowed_workspace_roots = []

[runtime.wasm]
tools_dir = "tools/wasm"
fuel_limit = 1000000
memory_limit_mb = 64
max_module_size_mb = 50
allow_workspace_read = false
allow_workspace_write = false
allowed_hosts = []

[runtime.wasm.security]
require_workspace_relative_tools_dir = true
reject_symlink_modules = true
reject_symlink_tools_dir = true
strict_host_validation = true
capability_escalation_mode = "deny"
module_hash_policy = "warn"

[runtime.wasm.security.module_sha256]

